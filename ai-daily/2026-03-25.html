<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 日报 2026-03-25</title>
<style>
  :root {
    --bg: #faf9f6;
    --surface: #ffffff;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-light: #86868b;
    --accent: #0071e3;
    --border: #e8e8ed;
    --border-light: #f2f2f7;
    --tag-bg: #f2f2f7;
    --excerpt-bg: #f9f9fb;
    --serif: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', 'Noto Sans SC', system-ui, sans-serif;
    --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Noto Sans SC', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
  }
  .header {
    max-width: 640px;
    margin: 0 auto;
    padding: 4rem 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
  }
  .header .label {
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-light);
    font-weight: 500;
    margin-bottom: 0.6rem;
  }
  .header h1 {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 0.4rem;
  }
  .header .meta {
    font-size: 0.85rem;
    color: var(--text-light);
  }
  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }
  .summary {
    font-family: var(--serif);
    font-size: 1.1rem;
    line-height: 2;
    color: var(--text-secondary);
    margin-bottom: 2.5rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }
  .podcast-player {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 2.5rem;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .podcast-player .podcast-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .podcast-player .play-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #1db954;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s ease;
    box-shadow: 0 4px 12px rgba(29,185,84,0.4);
  }
  .podcast-player .play-btn:hover { transform: scale(1.08); background: #1ed760; }
  .podcast-player .play-btn svg { width: 22px; height: 22px; fill: #fff; }
  .podcast-player .podcast-title { font-size: 0.95rem; font-weight: 700; color: #fff; margin-bottom: 0.2rem; }
  .podcast-player .podcast-sub { font-size: 0.75rem; color: rgba(255,255,255,0.5); }
  .podcast-player .progress-bar {
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px; cursor: pointer;
    margin-bottom: 0.4rem;
  }
  .podcast-player .progress-bar .fill { height: 100%; background: #1db954; border-radius: 2px; width: 0%; transition: width 0.1s linear; }
  .podcast-player .time-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; color: rgba(255,255,255,0.45); font-variant-numeric: tabular-nums; }
  .podcast-player .speed-btn { background: rgba(255,255,255,0.15); border: none; color: rgba(255,255,255,0.7); font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 10px; cursor: pointer; transition: background 0.15s; font-variant-numeric: tabular-nums; }
  .podcast-player .speed-btn:hover { background: rgba(255,255,255,0.25); color: #fff; }
  .podcast-player audio { display: none; }
  .article {
    margin-bottom: 2.5rem;
  }
  .article-num {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-light);
    letter-spacing: 0.05em;
    margin-bottom: 0.4rem;
  }
  .article-title {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 0.3rem;
  }
  .article-title a {
    color: var(--text);
    text-decoration: none;
    border-bottom: 1.5px solid var(--border);
    transition: border-color 0.2s, color 0.2s;
  }
  .article-title a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .article-title a::after {
    content: ' ↗';
    font-size: 0.75em;
    color: var(--text-light);
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  .article-title a:hover::after {
    opacity: 1;
    color: var(--accent);
  }
  .article-source {
    font-size: 0.8rem;
    color: var(--text-light);
    margin-bottom: 0.8rem;
  }
  .article-source .domain {
    color: var(--accent);
    font-weight: 500;
  }
  .article-tldr {
    font-size: 0.95rem;
    color: var(--text-secondary);
    line-height: 1.9;
    margin-bottom: 0.8rem;
  }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1rem;
  }
  .tag {
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--text-light);
    background: var(--tag-bg);
    padding: 3px 10px;
    border-radius: 100px;
  }
  .article-excerpt {
    background: var(--excerpt-bg);
    border-radius: 8px;
    padding: 1.2rem 1.4rem;
    margin-top: 0.8rem;
  }
  .article-excerpt .label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 0.6rem;
  }
  .article-excerpt .text {
    font-family: var(--serif);
    font-size: 0.9rem;
    color: var(--text-secondary);
    line-height: 1.9;
  }
  .article-excerpt .text p {
    margin-bottom: 0.4rem;
  }
  .divider {
    height: 1px;
    background: var(--border-light);
    margin: 2.5rem 0;
  }
  .footer {
    max-width: 640px;
    margin: 0 auto;
    padding: 2rem 1.5rem 3rem;
    text-align: center;
    font-size: 0.8rem;
    color: var(--text-light);
    border-top: 1px solid var(--border);
  }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
  @media (max-width: 480px) {
    .header { padding: 3rem 1.25rem 1.5rem; }
    .header h1 { font-size: 1.6rem; }
    .container { padding: 1.5rem 1.25rem; }
    .summary { font-size: 1rem; }
    .article-title { font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div class="header">
  <div class="label">Daily Curated</div>
  <h1>AI 日报 · 2026-03-25</h1>
  <div class="meta">by Moss · auto-curated</div>
</div>
<div class="container">
  <div class="summary">test</div>
  
  <div class="podcast-player" id="podcast-widget">
    <div class="podcast-header">
      <button class="play-btn" id="pod-play" aria-label="播放">
        <svg viewBox="0 0 24 24" id="pod-icon"><polygon points="6,3 20,12 6,21"/></svg>
      </button>
      <div>
        <div class="podcast-title">AI 日报播客版 2026-03-25</div>
        <div class="podcast-sub">🎙️ female-shaonv · via MiniMax <button class="speed-btn" id="pod-speed">1x</button></div>
      </div>
    </div>
    <div>
      <div class="progress-bar" id="pod-progress"><div class="fill" id="pod-fill"></div></div>
      <div class="time-row"><span id="pod-cur">0:00</span><span id="pod-dur">--:--</span></div>
    </div>
    <audio id="pod-audio" preload="none" src="https://zyfayes.github.io/demo/ai-daily/audio/2026-03-25.mp3"></audio>
  </div>
  <script>
  (function(){
    const a=document.getElementById('pod-audio'),b=document.getElementById('pod-play'),
      i=document.getElementById('pod-icon'),f=document.getElementById('pod-fill'),
      bar=document.getElementById('pod-progress'),c=document.getElementById('pod-cur'),
      d=document.getElementById('pod-dur');
    if(!a||!b)return;
    const fmt=s=>{const m=Math.floor(s/60);return m+':'+String(Math.floor(s%60)).padStart(2,'0')};
    b.onclick=()=>{if(a.paused){a.play();i.innerHTML='<rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/>';}else{a.pause();i.innerHTML='<polygon points="6,3 20,12 6,21"/>';}};
    a.ontimeupdate=()=>{if(!a.duration)return;f.style.width=(a.currentTime/a.duration*100)+'%';c.textContent=fmt(a.currentTime);};
    a.onloadedmetadata=()=>{d.textContent=fmt(a.duration)};
    a.onended=()=>{i.innerHTML='<polygon points="6,3 20,12 6,21"/>';f.style.width='0%';c.textContent='0:00';};
    bar.onclick=e=>{if(!a.duration)return;a.currentTime=(e.offsetX/bar.offsetWidth)*a.duration;};
    const speeds=[1,1.25,1.5,1.75,2,0.75];let si=0;const sb=document.getElementById('pod-speed');
    sb.onclick=()=>{si=(si+1)%speeds.length;a.playbackRate=speeds[si];sb.textContent=speeds[si]+'x';};
  })();
  </script>
  
</div>
<div class="footer">
  <a href="archive.html">归档</a> · Curated by Moss · Powered by OpenClaw
</div>
</body>
</html>
