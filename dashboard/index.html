<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Operations</title>
<style>
  :root {
    --bg: #faf9f6;
    --surface: #ffffff;
    --border: #e8e5e0;
    --text: #1a1a1a;
    --text2: #6b6560;
    --text3: #9b9590;
    --accent: #c96442;
    --accent-light: #fdf4f0;
    --green: #2d8a5e;
    --green-bg: #edf7f0;
    --red: #c0392b;
    --red-bg: #fdf0ee;
    --yellow: #b8860b;
    --yellow-bg: #fdf8ed;
    --tag-bg: #f0ede8;
    --tag-text: #5a5550;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1e; --surface: #232328; --border: #3a3a40;
      --text: #e8e5e0; --text2: #9b9590; --text3: #6b6560;
      --accent: #e0825a; --accent-light: #2a2220;
      --green: #4ade80; --green-bg: #1a2e1a;
      --red: #f87171; --red-bg: #2e1a1a;
      --yellow: #fbbf24; --yellow-bg: #2e2a1a;
      --tag-bg: #2a2a30; --tag-text: #9b9590;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
  
  .container { max-width: 780px; margin: 0 auto; padding: 48px 24px 80px; }
  
  /* Header */
  .header { margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .header .label { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); font-weight: 500; margin-bottom: 6px; }
  .header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.3; }
  .header .meta { font-size: 13px; color: var(--text3); margin-top: 4px; }
  
  /* Stats row */
  .stats { display: flex; gap: 24px; margin-bottom: 28px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat .num { font-size: 24px; font-weight: 700; }
  .stat .lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
  .num-green { color: var(--green); }
  .num-red { color: var(--red); }
  .num-yellow { color: var(--yellow); }
  .num-accent { color: var(--accent); }
  
  /* Tabs */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .tab { padding: 10px 20px; font-size: 14px; font-weight: 500; color: var(--text3); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  
  /* Sub-filters */
  .filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter { padding: 4px 12px; font-size: 12px; border-radius: 100px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .filter:hover { border-color: var(--text3); }
  .filter.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  
  .panel { display: none; }
  .panel.active { display: block; }
  
  /* ─── Cron Table ─── */
  .job-list { display: flex; flex-direction: column; gap: 1px; }
  .job-actions { display: flex; gap: 4px; }
  .job-btn { padding: 3px 8px; font-size: 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; transition: all 0.12s; white-space: nowrap; }
  .job-btn:hover { border-color: var(--accent); color: var(--accent); }
  .job-btn-run { color: var(--green); }
  .job-btn-run:hover { border-color: var(--green); }
  .job-row { display: grid; grid-template-columns: 8px 64px 1fr 120px 80px 60px auto; gap: 12px; align-items: center; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; font-size: 13px; transition: all 0.1s; }
  .job-row:hover { border-color: var(--text3); }
  .job-row.has-error { background: var(--red-bg); border-color: var(--red); }
  .job-row.is-disabled { opacity: 0.45; }
  
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-ok { background: var(--green); }
  .dot-error { background: var(--red); }
  .dot-off { background: var(--text3); opacity: 0.3; }
  
  .agent-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
  .agent-moss { color: #4a90d9; }
  .agent-max { color: #9b59b6; }
  .agent-mini { color: #27ae60; }
  .agent-white { color: var(--accent); }
  
  .job-name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .job-schedule { font-size: 11px; color: var(--text3); font-family: 'SF Mono', 'Menlo', monospace; }
  .job-time { font-size: 11px; color: var(--text3); }
  .job-duration { font-size: 11px; color: var(--text3); }
  
  .job-error { grid-column: 3 / -1; font-size: 11px; color: var(--red); margin-top: -4px; }
  
  /* ─── Kanban ─── */
  .kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 700px) { .kanban { grid-template-columns: 1fr; } }
  .col-header { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 10px; display: flex; justify-content: space-between; }
  .col-header .cnt { color: var(--text3); font-weight: 400; }
  
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: all 0.12s; }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  .card.high { border-left: 3px solid var(--red); }
  .card-title { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 6px; }
  .card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 10px; padding: 1px 7px; border-radius: 100px; background: var(--tag-bg); color: var(--tag-text); }
  .badge-source { font-weight: 500; }
  .badge-owner { background: none; color: var(--text3); }
  
  .empty-col { font-size: 12px; color: var(--text3); font-style: italic; padding: 16px 0; }
  
  /* ─── Modal ─── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
  .overlay.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; max-width: 440px; width: 90%; box-shadow: 0 16px 48px rgba(0,0,0,0.12); }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; line-height: 1.4; }
  .modal-field { margin-bottom: 14px; }
  .modal-field .lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .modal-field .val { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .modal select { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 13px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .btn { padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); transition: all 0.12s; }
  .btn:hover { border-color: var(--text3); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { opacity: 0.9; }
  .cmd-box { margin-top: 14px; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-family: 'SF Mono', monospace; font-size: 11px; color: var(--green); display: none; white-space: pre-wrap; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="label">Agent Operations</div>
    <h1>Dashboard</h1>
    <div class="meta" id="genTime"></div>
  </div>
  
  <div class="stats" id="statsRow"></div>
  
  <div class="tabs">
    <button class="tab active" onclick="switchTab('cron')">Cron Jobs</button>
    <button class="tab" onclick="switchTab('todo')">Todos</button>
  </div>
  
  <!-- Cron Panel -->
  <div class="panel active" id="panelCron">
    <div class="filters" id="cronFilters"></div>
    <div class="job-list" id="jobList"></div>
  </div>
  
  <!-- Todo Panel -->
  <div class="panel" id="panelTodo">
    <div class="filters" id="todoFilters"></div>
    <div class="kanban" id="kanban"></div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="mTitle"></h3>
    <div class="modal-field"><div class="lbl">Source / Owner</div><div class="val" id="mMeta"></div></div>
    <div class="modal-field"><div class="lbl">Context</div><div class="val" id="mCtx"></div></div>
    <div class="modal-field"><div class="lbl">Tags</div><div class="val" id="mTags"></div></div>
    <div class="modal-field">
      <div class="lbl">Status</div>
      <select id="mStatus">
        <option value="open">Open</option>
        <option value="in-progress">In Progress</option>
        <option value="done">Done</option>
        <option value="dropped">Dropped</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="applyChange()">Apply</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>
    <div class="cmd-box" id="cmdBox"></div>
  </div>
</div>

<script>
let DATA = null, cronFilter = 'all', todoFilter = 'all', selTodo = null;

async function loadData() {
  if (window.__DASHBOARD_DATA__) { DATA = window.__DASHBOARD_DATA__; }
  else { document.querySelector('.container').innerHTML = '<p style="color:var(--text3);padding:40px">No data available.</p>'; return; }
  render();
}

function render() {
  document.getElementById('genTime').textContent = new Date(DATA.generated).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
  const jobs = DATA.cronJobs, s = DATA.stats;
  const active = jobs.filter(j => j.enabled !== false);
  const errors = active.filter(j => j.state?.lastStatus === 'error');
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="num">${active.length}</div><div class="lbl">Active Jobs</div></div>
    <div class="stat"><div class="num ${errors.length?'num-red':'num-green'}">${errors.length}</div><div class="lbl">Errors</div></div>
    <div class="stat"><div class="num num-yellow">${s.openTodos}</div><div class="lbl">Open</div></div>
    <div class="stat"><div class="num num-accent">${s.inProgressTodos}</div><div class="lbl">In Progress</div></div>
    <div class="stat"><div class="num num-green">${s.doneTodos}</div><div class="lbl">Done</div></div>
  `;
  renderCronFilters(); renderCron(); renderTodoFilters(); renderKanban();
}

// ─── Tab ───
function switchTab(t) {
  document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(e => e.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(t === 'cron' ? 'panelCron' : 'panelTodo').classList.add('active');
}

// ─── Cron ───
function agentOf(j) { const id = j.agentId || 'main'; return id === 'main' ? 'moss' : id; }
function fmtSch(s) { if (!s) return '-'; if (s.kind==='cron') return s.expr; if (s.kind==='every') return `every ${Math.round(s.everyMs/60000)}m`; return '-'; }
function ago(ms) { if (!ms) return '-'; const d=Date.now()-ms; if(d<60000) return 'now'; if(d<3600000) return Math.floor(d/60000)+'m'; if(d<86400000) return Math.floor(d/3600000)+'h'; return Math.floor(d/86400000)+'d'; }
function until(ms) { if (!ms) return '-'; const d=ms-Date.now(); if(d<0) return 'overdue'; if(d<3600000) return Math.floor(d/60000)+'m'; if(d<86400000) return Math.floor(d/3600000)+'h'; return Math.floor(d/86400000)+'d'; }
function dur(ms) { if (!ms) return '-'; if(ms<60000) return (ms/1000|0)+'s'; return (ms/60000|0)+'m'+(ms%60000/1000|0)+'s'; }

function renderCronFilters() {
  const agents = [...new Set(DATA.cronJobs.map(agentOf))].sort();
  document.getElementById('cronFilters').innerHTML = `
    <button class="filter ${cronFilter==='all'?'active':''}" onclick="setCronFilter('all')">All</button>
    <button class="filter ${cronFilter==='errors'?'active':''}" onclick="setCronFilter('errors')">Errors</button>
    ${agents.map(a => `<button class="filter ${cronFilter===a?'active':''}" onclick="setCronFilter('${a}')">${a}</button>`).join('')}
  `;
}
function setCronFilter(f) { cronFilter = f; renderCronFilters(); renderCron(); }

function renderCron() {
  let jobs = DATA.cronJobs;
  if (cronFilter === 'errors') jobs = jobs.filter(j => j.state?.lastStatus === 'error');
  else if (cronFilter !== 'all') jobs = jobs.filter(j => agentOf(j) === cronFilter);
  jobs.sort((a,b) => {
    if (a.state?.lastStatus==='error' && b.state?.lastStatus!=='error') return -1;
    if (b.state?.lastStatus==='error' && a.state?.lastStatus!=='error') return 1;
    if (!a.enabled && b.enabled) return 1;
    return (a.state?.nextRunAtMs||0)-(b.state?.nextRunAtMs||0);
  });
  document.getElementById('jobList').innerHTML = jobs.map(j => {
    const s = j.state||{}, err = s.lastStatus==='error', off = j.enabled===false;
    const a = agentOf(j);
    return `<div class="job-row ${err?'has-error':''} ${off?'is-disabled':''}">
      <div class="dot ${off?'dot-off':err?'dot-error':'dot-ok'}"></div>
      <div class="agent-label agent-${a}">${a}</div>
      <div>
        <div class="job-name" title="${j.name}">${j.name}</div>
        <div class="job-schedule">${fmtSch(j.schedule)}</div>
      </div>
      <div class="job-time">${ago(s.lastRunAtMs)} ago → ${until(s.nextRunAtMs)}</div>
      <div class="job-duration">${dur(s.lastDurationMs)}</div>
      <div style="font-size:11px;color:var(--text3)">${s.lastDeliveryStatus==='delivered'?'✓':s.lastDeliveryStatus==='not-delivered'?'✗':'—'}</div>
      <div class="job-actions">
        <button class="job-btn" onclick="cronAction('${j.id}','${off?'enable':'disable'}')">${off?'Enable':'Disable'}</button>
        <button class="job-btn job-btn-run" onclick="cronAction('${j.id}','run')">▶ Run</button>
      </div>
      ${err?`<div class="job-error" style="grid-column:3/-1">⚠ ${(s.lastError||'').slice(0,80)}</div>`:''}
    </div>`;
  }).join('');
}

// ─── Kanban ───
function renderTodoFilters() {
  const sources = [...new Set(DATA.todos.map(t => t.source))].sort();
  document.getElementById('todoFilters').innerHTML = `
    <button class="filter ${todoFilter==='all'?'active':''}" onclick="setTodoFilter('all')">All</button>
    ${sources.map(s => `<button class="filter ${todoFilter===s?'active':''}" onclick="setTodoFilter('${s}')">${s}</button>`).join('')}
  `;
}
function setTodoFilter(f) { todoFilter = f; renderTodoFilters(); renderKanban(); }

function renderKanban() {
  let todos = DATA.todos;
  if (todoFilter !== 'all') todos = todos.filter(t => t.source === todoFilter);
  const cols = ['open','in-progress','done'];
  const labels = { open: 'Open', 'in-progress': 'In Progress', done: 'Done' };
  document.getElementById('kanban').innerHTML = cols.map(col => {
    const items = todos.filter(t => t.status === col);
    return `<div>
      <div class="col-header">${labels[col]} <span class="cnt">${items.length}</span></div>
      ${items.length ? items.map(t => `
        <div class="card ${t.priority==='high'?'high':''}" onclick='openModal(${JSON.stringify(t).replace(/'/g,"\\'")})'>
          <div class="card-title">${esc(t.title.slice(0,80))}</div>
          <div class="card-meta">
            <span class="badge badge-source">${t.source}</span>
            <span class="badge badge-owner">@${t.owner}</span>
            ${(t.tags||[]).slice(0,2).map(tag => `<span class="badge">${tag}</span>`).join('')}
          </div>
        </div>
      `).join('') : '<div class="empty-col">—</div>'}
    </div>`;
  }).join('');
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── Modal ───
function openModal(t) {
  selTodo = t;
  document.getElementById('mTitle').textContent = t.title;
  document.getElementById('mMeta').textContent = `${t.source} · @${t.owner} · ${t.type} · ${t.created||'?'}`;
  document.getElementById('mCtx').textContent = t.context || '—';
  document.getElementById('mTags').innerHTML = (t.tags||[]).map(g => `<span class="badge">${g}</span>`).join(' ');
  document.getElementById('mStatus').value = t.status;
  document.getElementById('cmdBox').style.display = 'none';
  document.getElementById('overlay').classList.add('show');
}
function closeModal() { document.getElementById('overlay').classList.remove('show'); selTodo = null; }
function applyChange() {
  if (!selTodo) return;
  const ns = document.getElementById('mStatus').value;
  const box = document.getElementById('cmdBox');
  box.textContent = `Tell Moss: change ${selTodo.id} (${selTodo.source}) → ${ns}`;
  box.style.display = 'block';
  const todo = DATA.todos.find(t => t.id === selTodo.id);
  if (todo) { todo.status = ns; renderKanban(); render(); }
}

// ─── Toast ───
function toast(msg, color) {
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);padding:10px 18px;border-radius:8px;font-size:12px;color:${color||'var(--green)'};box-shadow:0 4px 16px rgba(0,0,0,0.1);z-index:200;`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ─── Cron Actions (display command) ───
function cronAction(id, action) {
  const cmd = action === 'run' ? `cron run ${id}` : `cron ${action} ${id}`;
  toast(`Tell Moss: ${cmd}`, 'var(--accent)');
}

// ─── Init ───
